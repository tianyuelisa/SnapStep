<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>SnapStep </title>
 <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff8f0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center; 
    }

    h1 {
      margin-top: 20px;
      font-size: 2em;
      color: #333;
    }

    #titleImage {
      margin-top: 20px;
      width: 450px;   /* adjust size */
      max-width: 100%;
    }
    
    #startButton {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 1.2em;
      background-color: #f6a5c0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      transition: background-color 0.2s;
    }

    #startButton:hover {
      background-color: #e58ca0;
    }

    iframe {
      border: none;
      width: 90%;
      max-width: 1000px;
      height: 60vh;
      margin-top: 20px;
    }
  </style>
</head>
<body>


<img src="title.png" alt="Welcome to SnapStep!" id="titleImage">

  <!-- 点击开始按钮 -->
  <button id="startButton">Start the game! 🎲</button>

  <!-- Figma 原型 iframe -->
  <iframe
    id="snapStepFrame"
    src=""
    allowfullscreen>
  </iframe>

  <!-- 背景音乐 -->
  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const startButton = document.getElementById('startButton');
    const snapStepFrame = document.getElementById('snapStepFrame');
    const bgMusic = document.getElementById('bgMusic');

    startButton.addEventListener('click', () => {
      // 播放音乐
      bgMusic.play().catch(err => console.log('自动播放被阻止，需要用户交互'));

      // 加载 Figma 原型
      snapStepFrame.src = "https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/proto/zaZsn8k4tAclDRJgOCuWJ1/Snapstep?node-id=1-5260&t=7woQVmApMEkyAXnl-1";

      // 隐藏开始按钮
      startButton.style.display = "none";
    });
  </script>

</body>
</html>
